<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" role="img" aria-labelledby="title desc">
  <title id="title">Geometric Interpretation of OLS Projection</title>
  <desc id="desc">A vector Y is projected onto a predicted plane. The projected vector is Y-hat and the difference is the residual.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f5fa8" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f7d4f" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#b43737" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.18" />
    </filter>
  </defs>

  <rect x="0" y="0" width="760" height="430" fill="#ffffff" />

  <polygon points="115,318 568,318 684,210 232,210"
           fill="#dff2db" stroke="#475b43" stroke-width="2" filter="url(#shadow)" />
  <line x1="115" y1="318" x2="568" y2="318" stroke="#8daa82" stroke-width="1.2" />
  <line x1="232" y1="210" x2="684" y2="210" stroke="#8daa82" stroke-width="1.2" />
  <line x1="115" y1="318" x2="232" y2="210" stroke="#8daa82" stroke-width="1.2" />
  <line x1="568" y1="318" x2="684" y2="210" stroke="#8daa82" stroke-width="1.2" />

  <circle cx="245" cy="305" r="4.5" fill="#222222" />
  <text x="217" y="335" font-family="Arial, sans-serif" font-size="17" fill="#222222">Origin</text>

  <line x1="245" y1="305" x2="560" y2="305" stroke="#475b43" stroke-width="2" marker-end="url(#arrow-green)" />
  <text x="565" y="310" font-family="Arial, sans-serif" font-size="17" fill="#2f3b2d">X1 direction</text>

  <line x1="245" y1="305" x2="330" y2="226" stroke="#475b43" stroke-width="2" marker-end="url(#arrow-green)" />
  <text x="295" y="218" font-family="Arial, sans-serif" font-size="17" fill="#2f3b2d">X2 direction</text>

  <line x1="245" y1="305" x2="466" y2="236" stroke="#2f7d4f" stroke-width="4" marker-end="url(#arrow-green)" />
  <line x1="466" y1="236" x2="466" y2="84" stroke="#b43737" stroke-width="4" marker-end="url(#arrow-red)" />
  <line x1="245" y1="305" x2="466" y2="84" stroke="#1f5fa8" stroke-width="4" marker-end="url(#arrow-blue)" />

  <line x1="466" y1="236" x2="501" y2="222" stroke="#666666" stroke-width="1.5" stroke-dasharray="5,5" />
  <line x1="466" y1="84" x2="501" y2="222" stroke="#666666" stroke-width="1.5" stroke-dasharray="5,5" />
  <path d="M466 236 L486 236 L486 216" fill="none" stroke="#555555" stroke-width="1.8" />

  <circle cx="466" cy="236" r="6" fill="#2f7d4f" />
  <circle cx="466" cy="84" r="6" fill="#1f5fa8" />

  <text x="424" y="70" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f5fa8">Y</text>
  <text x="487" y="151" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#b43737">Residual e</text>
  <text x="388" y="261" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#2f7d4f">Y-hat</text>
  <text x="394" y="342" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#30452d">Predicted plane</text>
  <text x="383" y="366" font-family="Arial, sans-serif" font-size="16" fill="#4f654b">values explained by the regressors</text>
</svg>
